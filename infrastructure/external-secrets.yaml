# Kubernetes ExternalSecret resource for AWS Secrets Manager integration (LegalGuard AI)
# This requires the External Secrets Operator (https://external-secrets.io/)

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: legalguard-app-secrets
  namespace: legalguard-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-store
    kind: SecretStore
  target:
    name: legalguard-app-config
    creationPolicy: Owner
  data:
    # Database
    - secretKey: DB_URL
      remoteRef:
        key: legalguard/db/primary
        property: url
    - secretKey: DB_USER
      remoteRef:
        key: legalguard/db/primary
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: legalguard/db/primary
        property: password

    # AWS (Bedrock/S3/KMS)
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: legalguard/bedrock/credentials
        property: aws_access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: legalguard/bedrock/credentials
        property: aws_secret_access_key
    - secretKey: AWS_REGION
      remoteRef:
        key: legalguard/bedrock/credentials
        property: aws_region

    # Responsible AI / Security
    - secretKey: AUDIT_HMAC_KEY
      remoteRef:
        key: legalguard/audit/hmac-key
        property: key
    - secretKey: PII_SALT
      remoteRef:
        key: legalguard/pii/salt
        property: salt

---
# SecretStore resource for AWS integration
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager-store
  namespace: legalguard-production
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          # This IAM credential must have 'secretsmanager:GetSecretValue' permissions
          awsAuthToken:
            name: aws-iam-credentials
            key: aws-secret-access-key
