# EKS Deployment for LegalGuard AI Backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legalguard-backend
  namespace: legalguard
  labels:
    app: legalguard-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: legalguard-backend
  template:
    metadata:
      labels:
        app: legalguard-backend
    spec:
      serviceAccountName: legalguard-backend-sa
      containers:
        - name: backend
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com/legalguard-ai-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: legalguard-secrets
          env:
            - name: APP_ENV
              value: "production"
            - name: CORS_ORIGINS
              value: "https://legalguard.example.com"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
