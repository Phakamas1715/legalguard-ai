# EKS Service + ALB Ingress for LegalGuard AI Backend
apiVersion: v1
kind: Service
metadata:
  name: legalguard-backend-svc
  namespace: legalguard
spec:
  type: ClusterIP
  selector:
    app: legalguard-backend
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: legalguard-backend-ingress
  namespace: legalguard
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-1:ACCOUNT_ID:certificate/CERT_ID
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:ap-southeast-1:ACCOUNT_ID:regional/webacl/legalguard-waf/WAF_ID
spec:
  rules:
    - host: api.legalguard.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: legalguard-backend-svc
                port:
                  number: 80
