# Horizontal Pod Autoscaler — scale 2-8 pods based on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: legalguard-backend-hpa
  namespace: legalguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: legalguard-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
