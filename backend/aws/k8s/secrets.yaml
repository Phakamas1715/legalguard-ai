  # --- AWS ---
  AWS_REGION: "ap-southeast-1"
  AWS_BEARER_TOKEN_BEDROCK: "REPLACE_WITH_REAL_TOKEN"
  EMBEDDING_PROVIDER: "bedrock"

  # --- Database ---
  DATABASE_URL: "REPLACE_WITH_AURORA_URL"
  REDIS_URL: "REPLACE_WITH_ELASTICACHE_URL"
