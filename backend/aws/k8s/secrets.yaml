# Kubernetes Secret for LegalGuard AI
#
# ⚠️  DO NOT put real credentials here.
#     Use one of these approaches in production:
#
#     1. AWS Secrets Manager + External Secrets Operator (recommended)
#        https://external-secrets.io/latest/provider/aws-secrets-manager/
#
#     2. kubectl create secret from literal:
#        kubectl create secret generic legalguard-secrets \
#          --from-literal=DATABASE_URL="postgresql://..." \
#          --from-literal=ANTHROPIC_API_KEY="sk-ant-..." \
#          -n legalguard
#
#     3. Sealed Secrets (Bitnami):
#        kubeseal --format=yaml < secret.yaml > sealed-secret.yaml
#
# This file contains PLACEHOLDER values only for development reference.
# -------------------------------------------------------------------

apiVersion: v1
kind: Secret
metadata:
  name: legalguard-secrets
  namespace: legalguard
  annotations:
    description: "Placeholder — replace with AWS Secrets Manager in production"
type: Opaque
stringData:
  # --- LLM ---
  LLM_PROVIDER: "bedrock"
  ANTHROPIC_API_KEY: "REPLACE_WITH_REAL_KEY"
