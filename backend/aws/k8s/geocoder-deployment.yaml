# EKS Deployment for Traccar Geocoder — self-hosted reverse geocoding
# ข้อมูล OSM ประเทศไทย → ข้อมูลไม่ออกนอก VPC (PDPA compliant)
# ใช้สำหรับ: ระบุตำแหน่งศาล/สถานีตำรวจ จาก GPS coordinates
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legalguard-geocoder
  namespace: legalguard
  labels:
    app: legalguard-geocoder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: legalguard-geocoder
  template:
    metadata:
      labels:
        app: legalguard-geocoder
    spec:
      containers:
        - name: geocoder
          image: traccar/traccar-geocoder:latest
          ports:
            - containerPort: 3000
          env:
            # Thailand OSM data (~300MB PBF → ~1GB index)
            - name: PBF_URLS
              value: "https://download.geofabrik.de/asia/thailand-latest.osm.pbf"
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: geocoder-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /reverse?lat=13.75&lon=100.50&key=health
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 60
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /reverse?lat=13.75&lon=100.50&key=health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: geocoder-data
          persistentVolumeClaim:
            claimName: geocoder-data-pvc
---
# PVC for geocoder index data (~1GB for Thailand)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: geocoder-data-pvc
  namespace: legalguard
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 5Gi
---
# ClusterIP Service — internal only (not exposed to internet)
apiVersion: v1
kind: Service
metadata:
  name: legalguard-geocoder-svc
  namespace: legalguard
spec:
  type: ClusterIP
  selector:
    app: legalguard-geocoder
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
