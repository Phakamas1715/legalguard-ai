# AWS CodeBuild buildspec for LegalGuard AI Backend
# Builds Docker image and pushes to ECR
version: 0.2

env:
  variables:
    AWS_REGION: ap-southeast-1
    ECR_REPO: legalguard-ai-backend
    EKS_CLUSTER: legalguard-cluster

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_URI
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
  build:
    commands:
      - echo Building Docker image...
      - cd backend
      - docker build -t $ECR_REPO:$IMAGE_TAG .
      - docker tag $ECR_REPO:$IMAGE_TAG $ECR_URI:$IMAGE_TAG
      - docker tag $ECR_REPO:$IMAGE_TAG $ECR_URI:latest
  post_build:
    commands:
      - echo Pushing to ECR...
      - docker push $ECR_URI:$IMAGE_TAG
      - docker push $ECR_URI:latest
      - echo Writing image definition...
      - printf '{"ImageURI":"%s"}' $ECR_URI:$IMAGE_TAG > imageDetail.json

artifacts:
  files:
    - imageDetail.json
    - backend/aws/k8s/*.yaml
